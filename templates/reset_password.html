{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<section class="auth-standalone-section" style="display:flex;justify-content:center;align-items:flex-start;padding:32px 12px;">
  <div class="auth-modal-shell open" style="position:static;transform:none;opacity:1;visibility:visible;max-width:460px;width:100%;">
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fa-solid fa-key"></i></div>
      <span>FreshWash</span>
    </div>
    <h2>Set a new password</h2>
    <p class="auth-form-copy">Enter your new password below to complete your password reset.</p>

    <form class="auth-form" id="resetPasswordForm" novalidate>
      <input type="hidden" id="resetAccessToken" />
      <input type="hidden" id="resetRefreshToken" />
      <div class="rv-field password-field">
        <span class="rv-fi"><i class="fa-solid fa-lock"></i></span>
        <input type="password" id="resetPassword" class="rv-input" placeholder="New password" required minlength="8" />
      </div>
      <div class="rv-field password-field">
        <span class="rv-fi"><i class="fa-solid fa-lock"></i></span>
        <input type="password" id="resetPasswordConfirm" class="rv-input" placeholder="Confirm new password" required minlength="8" />
      </div>
      <button type="submit" class="btn-primary w-full" id="resetPasswordSubmitBtn">Update Password</button>
    </form>

    <p class="auth-foot">Back to <a href="{{ url_for('login') }}" class="text-link">login</a></p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    const form = document.getElementById("resetPasswordForm");
    const accessTokenEl = document.getElementById("resetAccessToken");
    const refreshTokenEl = document.getElementById("resetRefreshToken");
    const passwordEl = document.getElementById("resetPassword");
    const confirmEl = document.getElementById("resetPasswordConfirm");
    const submitBtn = document.getElementById("resetPasswordSubmitBtn");
    if (!form || !accessTokenEl || !refreshTokenEl || !passwordEl || !confirmEl || !submitBtn) return;

    const hash = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
    accessTokenEl.value = (hash.get("access_token") || "").trim();
    refreshTokenEl.value = (hash.get("refresh_token") || "").trim();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = (passwordEl.value || "").trim();
      const confirmPassword = (confirmEl.value || "").trim();
      if (password.length < 8) {
        if (typeof showToast === "function") showToast("Password must be at least 8 characters.", true);
        return;
      }
      if (!/[A-Z]/.test(password)) {
        if (typeof showToast === "function") showToast("Password must include at least one uppercase letter.", true);
        return;
      }
      if (!/[0-9]/.test(password)) {
        if (typeof showToast === "function") showToast("Password must include at least one number.", true);
        return;
      }
      if (password !== confirmPassword) {
        if (typeof showToast === "function") showToast("Passwords do not match.", true);
        return;
      }
      if (!accessTokenEl.value) {
        if (typeof showToast === "function") showToast("Reset link is invalid or expired. Please request a new one.", true);
        return;
      }

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "Updating...";
      try {
        const response = await fetch("/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            access_token: accessTokenEl.value,
            refresh_token: refreshTokenEl.value,
            password: password,
            confirm_password: confirmPassword,
          }),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Unable to reset password right now.");
        }
        if (typeof showToast === "function") showToast(data.message || "Password reset successful. You can now log in.");
        form.reset();
        setTimeout(() => {
          window.location.href = "{{ url_for('login') }}";
        }, 900);
      } catch (error) {
        if (typeof showToast === "function") showToast(error.message || "Unable to reset password right now.", true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  })();
</script>
{% endblock %}
