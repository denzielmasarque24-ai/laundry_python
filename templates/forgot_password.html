{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="auth-standalone-section" style="display:flex;justify-content:center;align-items:flex-start;padding:32px 12px;">
  <div class="auth-modal-shell open" style="position:static;transform:none;opacity:1;visibility:visible;max-width:460px;width:100%;">
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fa-solid fa-envelope-circle-check"></i></div>
      <span>FreshWash</span>
    </div>
    <h2>Forgot your password?</h2>
    <p class="auth-form-copy">Enter your account email and we'll send you a reset link.</p>

    <form class="auth-form" id="forgotPasswordPageForm" novalidate>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" id="forgotPasswordPageEmail" class="rv-input" placeholder="Email address" required />
      </div>
      <button type="submit" class="btn-primary w-full" id="forgotPasswordSubmitBtn">Send Reset Link</button>
    </form>

    <p class="auth-foot">Back to <a href="{{ url_for('login') }}" class="text-link">login</a></p>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    const form = document.getElementById("forgotPasswordPageForm");
    const emailEl = document.getElementById("forgotPasswordPageEmail");
    const submitBtn = document.getElementById("forgotPasswordSubmitBtn");
    if (!form || !emailEl || !submitBtn) return;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = (emailEl.value || "").trim();
      if (!email) {
        if (typeof showToast === "function") showToast("Please enter your email address.", true);
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        if (typeof showToast === "function") showToast("Please enter a valid email address.", true);
        return;
      }

      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = "Sending...";
      try {
        const response = await fetch("{{ url_for('forgot_password') }}", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Unable to send reset link right now.");
        }
        if (typeof showToast === "function") showToast(data.message || "Reset link sent. Check your email");
        form.reset();
      } catch (error) {
        if (typeof showToast === "function") showToast(error.message || "Unable to send reset link right now.", true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  })();
</script>
{% endblock %}
