{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-center">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fa-solid fa-shirt"></i></div>
      <span>FreshWash</span>
    </div>
    <h1 class="auth-title">Sign in to continue</h1>
    <p class="auth-sub">Access bookings, services, and your profile in one compact workspace.</p>
    <form method="POST" class="auth-form">
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" name="email" class="rv-input" placeholder="Email address" required/>
      </div>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password" class="rv-input" placeholder="Password" required/>
      </div>
      <button type="submit" class="btn-primary w-full">Sign In</button>
    </form>
    <p class="auth-foot">New here? <a href="{{ url_for('register') }}" class="text-link">Sign Up</a></p>
    <p class="auth-foot"><a href="{{ url_for('readers_view') }}" class="text-link">Open Reader's View</a></p>
  </div>
</section>
{% endblock %}
