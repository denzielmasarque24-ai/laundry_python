{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="auth-card card shadow-lg border-0 p-4">
      <div class="text-center mb-4">
        <div class="brand-icon mb-3"><i class="fa-solid fa-shirt fa-2x"></i></div>
        <h2 class="fw-bold pink-text">FreshWash</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text pink-icon"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text pink-icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-pink w-100 py-2 fw-bold">Sign In</button>
      </form>
      <p class="text-center mt-3 mb-0">Don't have an account?
        <a href="{{ url_for('register') }}" class="pink-link fw-semibold">Sign Up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
