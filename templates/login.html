{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-center">
  <div class="auth-shell auth-shell-compact">
    <div class="auth-card auth-form-card auth-form-card-compact">
      <div class="auth-brand">
        <div class="auth-brand-icon"><i class="fa-solid fa-shirt"></i></div>
        <span>FreshWash</span>
      </div>
      <h2 class="auth-form-title">Sign in to continue</h2>
      <p class="auth-form-copy">Access bookings, services, and your profile in one compact workspace.</p>
      <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate>
        <div class="rv-field">
          <span class="rv-fi"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" name="email" class="rv-input" placeholder="Email address" autocomplete="email" value="{{ form_data.get('email', '') }}" required/>
        </div>
        <div class="rv-field password-field">
          <span class="rv-fi"><i class="fa-solid fa-lock"></i></span>
          <input type="password" name="password" id="loginPagePassword" class="rv-input" placeholder="Password" autocomplete="current-password" required/>
          <button type="button" class="password-toggle" data-password-toggle="loginPagePassword" aria-label="Show password">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>
        <button type="submit" class="btn-primary w-full">Login</button>
      </form>
      <p class="auth-foot">New here? <a href="{{ url_for('register') }}" class="text-link">Register</a></p>
    </div>
  </div>
</section>
{% endblock %}
