{% extends 'admin_base.html' %}

{% block content %}
<!-- DASHBOARD -->
      <section class="admin-panel {% if active_page == 'dashboard' %}is-active{% endif %}" data-panel="dashboard" aria-label="Dashboard">
        <div class="admin-panel-tools">
          <div class="admin-panel-tools-spacer" aria-hidden="true"></div>
          <span class="admin-pill" id="dashboardLastUpdated">Using initial dashboard data</span>
        </div>
        <div id="statsGrid" class="admin-overview-grid admin-overview-grid-dashboard"></div>

        <div class="admin-dashboard-grid">
          <section class="admin-card admin-recent-bookings-card">
            <div class="admin-card-head">
              <div>
                <small class="admin-kicker">Recent Activity</small>
                <h2>Recent Bookings</h2>
              </div>
              <span class="admin-pill">Latest 5</span>
            </div>
            <div id="recentBookingsList" class="admin-timeline" aria-live="polite"></div>
          </section>

          <aside class="admin-card admin-card-accent admin-live-machines-card">
            <div class="admin-card-head">
              <div>
                <small class="admin-kicker">Machine Floor</small>
                <h2>Live Machine Status</h2>
              </div>
              <span class="admin-pill">All machines</span>
            </div>
            <div id="machineStatusPanel" class="admin-machine-grid admin-live-machine-grid" aria-live="polite"></div>
          </aside>
        </div>
      </section>

      
{% endblock %}
