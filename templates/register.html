{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="auth-center">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fa-solid fa-shirt"></i></div>
      <span>FreshWash</span>
    </div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Set up your profile so booking and pickup details stay quick and organized.</p>
    <form method="POST" class="auth-form">
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-user"></i></span>
        <input type="text" name="name" class="rv-input" placeholder="Full name" required/>
      </div>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-envelope"></i></span>
        <input type="email" name="email" class="rv-input" placeholder="Email address" required/>
      </div>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-phone"></i></span>
        <input type="tel" name="phone" class="rv-input" placeholder="Phone number" required/>
      </div>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-location-dot"></i></span>
        <input type="text" name="address" class="rv-input" placeholder="Address" required/>
      </div>
      <div class="rv-field">
        <span class="rv-fi"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password" class="rv-input" placeholder="Password (min. 6)" required minlength="6"/>
      </div>
      <button type="submit" class="btn-primary w-full">Create Account</button>
    </form>
    <p class="auth-foot">Already have an account? <a href="{{ url_for('login') }}" class="text-link">Sign In</a></p>
  </div>
</section>
{% endblock %}
