{% extends "base.html" %}
{% block title %}Messages{% endblock %}
{% block extra_head %}
<style>
  .messages-page-wrap {
    width: min(1120px, 100%);
    margin: 0 auto;
    padding: 10px 20px 24px;
  }

  .messages-shell {
    border-radius: 24px;
    border: 1px solid rgba(255, 176, 218, 0.35);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(255, 237, 247, 0.88));
    box-shadow: 0 20px 44px rgba(214, 86, 153, 0.18);
    overflow: hidden;
  }

  .messages-head {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255, 178, 218, 0.42);
    background: rgba(255, 246, 251, 0.84);
  }

  .messages-head h2 {
    margin: 0;
    color: #462033;
    font-size: 1.08rem;
  }

  .messages-grid {
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr);
    min-height: min(620px, calc(100vh - 230px));
  }

  .conversation-list {
    border-right: 1px solid rgba(255, 178, 218, 0.42);
    background: rgba(255, 247, 252, 0.7);
    padding: 8px;
    overflow-y: auto;
  }

  .conversation-item {
    width: 100%;
    border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    text-align: left;
    cursor: pointer;
    margin-bottom: 6px;
    padding: 10px 11px;
    color: #452133;
  }

  .conversation-item:hover,
  .conversation-item.is-active {
    background: rgba(255, 222, 240, 0.75);
    border-color: rgba(234, 107, 176, 0.4);
  }

  .conversation-title {
    display: block;
    font-size: 0.88rem;
    font-weight: 700;
  }

  .conversation-sub {
    display: block;
    font-size: 0.76rem;
    margin-top: 3px;
    color: #875e76;
  }

  .messages-main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
  }

  .messages-thread-head {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255, 178, 218, 0.42);
    color: #6e4760;
    font-size: 0.84rem;
  }

  .messages-list {
    overflow-y: auto;
    padding: 14px;
    display: grid;
    gap: 10px;
    align-content: start;
  }

  .message-row {
    display: flex;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.admin {
    justify-content: flex-start;
  }

  .message-bubble {
    max-width: min(84%, 520px);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 0.88rem;
    line-height: 1.45;
  }

  .message-row.user .message-bubble {
    color: #fff;
    background: linear-gradient(135deg, #ff4da6, #ff7ac3);
    border-bottom-right-radius: 6px;
  }

  .message-row.admin .message-bubble {
    color: #462033;
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid rgba(255, 182, 220, 0.45);
    border-bottom-left-radius: 6px;
  }

  .message-time {
    margin-top: 4px;
    font-size: 0.72rem;
    opacity: 0.82;
  }

  .messages-compose {
    padding: 10px 12px;
    border-top: 1px solid rgba(255, 178, 218, 0.42);
    background: rgba(255, 247, 252, 0.8);
  }

  .messages-form {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
  }

  .messages-input {
    width: 100%;
    min-height: 42px;
    border-radius: 12px;
    border: 1px solid rgba(255, 167, 210, 0.45);
    padding: 10px 12px;
    resize: none;
  }

  .messages-send {
    min-height: 42px;
    border: 0;
    border-radius: 12px;
    color: #fff;
    font-weight: 700;
    padding: 0 16px;
    background: linear-gradient(135deg, #ff4da6, #ff7ac3);
    cursor: pointer;
  }

  .messages-empty {
    text-align: center;
    color: #946f85;
    padding: 24px 10px;
    font-size: 0.88rem;
  }

  @media (max-width: 900px) {
    .messages-grid {
      grid-template-columns: 1fr;
      grid-template-rows: 200px minmax(0, 1fr);
    }

    .conversation-list {
      border-right: 0;
      border-bottom: 1px solid rgba(255, 178, 218, 0.42);
    }
  }
</style>
{% endblock %}
{% block content %}
<div class="messages-page-wrap">
  <div class="messages-shell">
    <div class="messages-head">
      <h2>Messages</h2>
    </div>
    <div class="messages-grid">
      <aside id="conversationList" class="conversation-list">
        <div class="messages-empty">Loading conversations...</div>
      </aside>
      <section class="messages-main">
        <div id="threadHead" class="messages-thread-head">Select a booking conversation.</div>
        <div id="messagesList" class="messages-list">
          <div class="messages-empty">No messages yet.</div>
        </div>
        <div class="messages-compose">
          <form id="messagesForm" class="messages-form">
            <textarea id="messageInput" class="messages-input" placeholder="Type your message..." rows="1" required></textarea>
            <button type="submit" id="messageSendBtn" class="messages-send">Send</button>
          </form>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
(() => {
  const bookings = {{ bookings|tojson }};
  const conversationList = document.getElementById("conversationList");
  const threadHead = document.getElementById("threadHead");
  const messagesList = document.getElementById("messagesList");
  const messagesForm = document.getElementById("messagesForm");
  const messageInput = document.getElementById("messageInput");
  const messageSendBtn = document.getElementById("messageSendBtn");

  let activeBookingId = "";
  let threadMessages = [];

  function esc(v) {
    return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function fmt(v) {
    const dt = new Date(v || "");
    if (Number.isNaN(dt.getTime())) return "";
    return dt.toLocaleString([], { year: "numeric", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }

  function renderConversations() {
    if (!bookings.length) {
      conversationList.innerHTML = '<div class="messages-empty">No bookings found.</div>';
      return;
    }
    conversationList.innerHTML = bookings.map(b => {
      const active = b.id === activeBookingId ? " is-active" : "";
      return `<button type="button" class="conversation-item${active}" data-booking-id="${esc(b.id)}">
        <span class="conversation-title">${esc(b.service_type || "Booking")}</span>
        <span class="conversation-sub">${esc(b.pickup_date || "")} ${esc(b.pickup_time || "")}</span>
      </button>`;
    }).join("");
  }

  function renderMessages() {
    const current = bookings.find(b => b.id === activeBookingId);
    threadHead.textContent = current ? `Booking: ${current.service_type || "Booking"}` : "Select a booking conversation.";
    if (!activeBookingId) {
      messagesList.innerHTML = '<div class="messages-empty">Select a booking conversation.</div>';
      return;
    }
    if (!threadMessages.length) {
      messagesList.innerHTML = '<div class="messages-empty">No messages yet. Start your conversation.</div>';
      return;
    }
    messagesList.innerHTML = threadMessages.map(m => {
      const role = String(m.sender || "").toLowerCase() === "user" ? "user" : "admin";
      return `<div class="message-row ${role}">
        <div class="message-bubble">
          <div>${esc(m.message)}</div>
          <div class="message-time">${esc(fmt(m.created_at))}</div>
        </div>
      </div>`;
    }).join("");
    messagesList.scrollTop = messagesList.scrollHeight;
  }

  async function loadThread(bookingId) {
    if (!bookingId) return;
    const res = await fetch(`/api/messages/list?booking_id=${encodeURIComponent(bookingId)}`);
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || "Failed to load messages");
    threadMessages = data.messages || [];
    renderMessages();
  }

  document.addEventListener("click", async (e) => {
    const btn = e.target.closest(".conversation-item");
    if (!btn) return;
    activeBookingId = btn.dataset.bookingId || "";
    renderConversations();
    try {
      await loadThread(activeBookingId);
    } catch (err) {
      messagesList.innerHTML = `<div class="messages-empty">${esc(err.message || "Unable to load messages")}</div>`;
    }
  });

  messagesForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = (messageInput.value || "").trim();
    if (!activeBookingId || !text) return;
    messageSendBtn.disabled = true;
    messageSendBtn.textContent = "Sending...";
    try {
      const res = await fetch("/api/messages/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ booking_id: activeBookingId, message: text })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || "Failed to send message");
      messageInput.value = "";
      await loadThread(activeBookingId);
      if (typeof showToast === "function") showToast("Message sent");
    } catch (err) {
      if (typeof showToast === "function") showToast(String(err.message || "Unable to send message"), true);
    } finally {
      messageSendBtn.disabled = false;
      messageSendBtn.textContent = "Send";
    }
  });

  if (bookings.length) {
    activeBookingId = bookings[0].id;
    renderConversations();
    loadThread(activeBookingId).catch(() => renderMessages());
  } else {
    renderConversations();
    renderMessages();
  }
})();
</script>
{% endblock %}
